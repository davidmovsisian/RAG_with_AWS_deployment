
services:
  api_worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: rag-api:1.0
    container_name: rag-api
    env_file:
      - .env
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    ports:
      - "5000:5000"
    restart: unless-stopped 
